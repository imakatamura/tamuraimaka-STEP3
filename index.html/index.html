<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tamuraimaka_step3
    </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div>
    <h1>TNG CAFE</h1>
    <p>心安らぐ一杯をあなたに</p>
    <nav>
        <ul>
            <li><a href="#about">About Us</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    </header>
    </div>
    <main></main>
    <section id="about">
        <h2>About Us</h2>
        <p>TNGCafeは自然の香りに包まれたリラックス空間を提供しています。<br>
            自家焙煎コーヒーと手作りスイーツで、穏やかな時間をお過ごしください。
        </p>
        <img src="./cafe.jpg.png" alt="カフェの写真">
    </section>
    <section id="menu">
  <h2>Menu</h2>
  
  <div class="menu-container">
    
    <div class="menu-item">
      <img src="coffee.jpd.png" alt="コーヒー">
      <p>ブレンドコーヒー</p>
    </div>

    <div class="menu-item">
      <img src="cake.jpd.png" alt="ケーキ">
      <p>ベイクドチーズケーキ</p>
    </div>

    <div class="menu-item">
      <img src="cafe au lait jpd.png" alt="ラテ">
      <p>カフェラテ</p>
    </div>

  </div>
</section>

    </section>
    <section id="contact">
        <h2>Contact</h2>
        <form action="#" method="post">
            <label for="name">名前</label>
            <input type="text" id="name" name="name">
        
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email">
        
            <label for="message">お問い合わせ内容</label>
            <textarea id="message" name="message"></textarea>

            <button type="submit">送信</button>
        </form>
    </section>
</main>
<footer>
    <p><small>&copy; 2026 TNG CAFE</small></p>
</footer>
</body>
</html>
